get:
  tags:
    - activity
  description: "Get place visit history. startAt から endAt までの訪問回数を返す。単日範囲では訪問レコード数、複数日範囲では同一ユーザーの同一日の複数回訪問を1回として数える。"
  security:
    - BearerAuth: []
  parameters:
    - name: place
      in: path
      required: true
      schema:
        type: string
    - name: startAt
      in: query
      required: true
      schema:
        type: string
        format: date-time
      description: "集計開始日時。endAt 以下である必要がある。"
    - name: endAt
      in: query
      required: true
      schema:
        type: string
        format: date-time
      description: "集計終了日時。startAt 以上である必要がある。"
  responses:
    200:
      description: "Success get place history"
      content:
        application/json:
          schema:
            $ref: "../schemas/res_get_activity_place_place_history.yml"
    400:
      $ref: "../responses/bad_request.yml"
    403:
      $ref: "../responses/unauthorized.yml"
    500:
      $ref: "../responses/internal_server.yml"
